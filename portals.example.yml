# ─────────────────────────────────────────────────────────────────
#  JobForge — Job Portals Configuration
#  Copy this file to portals.yml and customize for your job search
# ─────────────────────────────────────────────────────────────────

# Keywords to filter job titles by (leave empty to get all jobs)
keywords:
  - "AI Engineer"
  - "ML Engineer"
  - "Software Engineer"
  - "Backend Engineer"
  - "Platform Engineer"
  - "Staff Engineer"

# Companies to scan — specify the ATS they use
# Supported ATS: greenhouse, lever, ashby
companies:
  # ── AI Labs ──────────────────────────────────
  - name: "Anthropic"
    ats: "greenhouse"
    slug: "anthropic"

  - name: "OpenAI"
    ats: "greenhouse"
    slug: "openai"

  - name: "Mistral AI"
    ats: "lever"
    slug: "mistral"

  - name: "Cohere"
    ats: "greenhouse"
    slug: "cohere"

  # ── AI Platforms ─────────────────────────────
  - name: "LangChain"
    ats: "ashby"
    slug: "langchain"

  - name: "Pinecone"
    ats: "greenhouse"
    slug: "pinecone"

  - name: "Weights & Biases"
    ats: "lever"
    slug: "wandb"

  # ── Developer Tools ──────────────────────────
  - name: "Vercel"
    ats: "lever"
    slug: "vercel"

  - name: "Retool"
    ats: "greenhouse"
    slug: "retool"

  - name: "Linear"
    ats: "ashby"
